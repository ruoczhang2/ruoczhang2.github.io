<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>学术写作重构与反检测教练</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: #f5f7fb;
        }

        /* 顶部导航栏 */
        .app-header {
            background: linear-gradient(135deg, #1e2a3a 0%, #0f1724 100%);
            color: white;
            padding: 16px 24px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* 聊天容器 - 将占满剩余空间 */
        #chat-container {
            width: 100%;
            height: calc(100% - 70px);  /* 减去 header 高度 */
            background: white;
            position: relative;
            overflow: hidden;
        }

        /* 加载动画 */
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #4b5563;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-box {
            background: #fee2e2;
            color: #b91c1c;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 20px;
        }
    </style>
    <!-- Coze Web SDK (稳定版) -->
    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
</head>
<body>
    <div class="app-header">📝 学术写作重构与反检测教练 🤖</div>
    <div id="chat-container">
        <div class="loader" id="loading">
            <div class="spinner"></div>
            <div>正在启动智能助手，请稍候...</div>
        </div>
    </div>

    <script>
        // ======================== 请修改以下两项 ========================
        const SAT_TOKEN = 'sat_你的真实令牌';   // 👈 替换为你的服务访问令牌 (以 sat_ 开头)
        const BOT_ID = '7629241748220280842';   // 👈 替换为你的 Bot ID (纯数字)
        // ================================================================

        // 为每个学生生成唯一标识 (存储在 localStorage 中)
        function getOrCreateStudentId() {
            const key = 'coze_unique_student_id';
            let id = localStorage.getItem(key);
            if (!id) {
                id = 'student_' + Date.now() + '_' + Math.random().toString(36).substring(2, 14);
                localStorage.setItem(key, id);
            }
            return id;
        }

        // 隐藏SDK自带的悬浮球 (避免右下角出现第二个窗口)
        function hideFloatBall() {
            const style = document.createElement('style');
            style.textContent = `
                .coze-chat-ball,
                .coze-chat-ball *,
                [class*="coze-chat-ball"],
                .chat-ball-wrapper,
                .floating-chat-btn {
                    display: none !important;
                    visibility: hidden !important;
                    opacity: 0 !important;
                    pointer-events: none !important;
                    width: 0 !important;
                    height: 0 !important;
                }
            `;
            document.head.appendChild(style);
        }

        // 强制展开聊天窗口 (使其显示在 container 中)
        async function showChatClient(client) {
            if (!client) return;
            // SDK 通常提供 show 方法
            if (typeof client.show === 'function') {
                try {
                    client.show();
                    console.log('[嵌入] 调用 client.show() 成功');
                } catch (e) {
                    console.warn('[嵌入] show() 调用失败', e);
                }
            }
            // 备选方案: 触发 resize 事件
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
            }, 200);
        }

        async function initChat() {
            const container = document.getElementById('chat-container');
            const loadingDiv = document.getElementById('loading');

            // 1. 检查 SDK 是否加载
            if (typeof CozeWebSDK === 'undefined') {
                if (loadingDiv) {
                    loadingDiv.innerHTML = '<div class="error-box">SDK 加载失败，请刷新页面或检查网络后重试。</div>';
                }
                return;
            }

            // 2. 获取学生唯一ID
            const studentId = getOrCreateStudentId();
            console.log('[会话隔离] 当前学生ID:', studentId);

            // 3. 移除加载动画
            if (loadingDiv) loadingDiv.remove();
            container.innerHTML = '';   // 清空容器，准备渲染聊天界面

            // 4. 隐藏悬浮球 (避免右下角出现)
            hideFloatBall();

            // 5. 创建聊天客户端
            let chatClient = null;
            try {
                chatClient = new CozeWebSDK.WebChatClient({
                    config: { bot_id: BOT_ID },
                    componentProps: { title: '学术写作教练' },
                    auth: {
                        type: 'token',
                        token: SAT_TOKEN,
                        onRefreshToken: async () => SAT_TOKEN,
                    },
                    userInfo: {
                        id: studentId,
                        nickname: '同学'
                    },
                    container: container,
                    // layout: 'embed'   // 如果 layout 不生效，我们手动强制显示
                });
                console.log('[初始化] WebChatClient 实例创建成功');
            } catch (err) {
                console.error('[初始化] 创建实例失败:', err);
                container.innerHTML = `<div class="error-box">启动失败：${err.message || '未知错误'}<br>请检查令牌权限或刷新页面</div>`;
                return;
            }

            // 6. 强制显示聊天窗口 (覆盖悬浮模式)
            // 等待 DOM 渲染完成后再执行
            setTimeout(() => {
                showChatClient(chatClient);
            }, 500);

            // 再次确保窗口可见 (某些情况下需要延迟更久)
            setTimeout(() => {
                showChatClient(chatClient);
            }, 1500);
        }

        // 启动
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initChat);
        } else {
            initChat();
        }
    </script>
</body>
</html>
