<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>学术写作重构与反检测教练</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        .header {
            background: #1e2a3a;
            color: white;
            padding: 14px 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        #chat-container {
            width: 100%;
            height: calc(100% - 60px);
            min-height: 500px;
            background: #fff;
            position: relative;
        }
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #4b5563;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box {
            background: #fee2e2;
            color: #b91c1c;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 20px;
        }
    </style>
    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
</head>
<body>
    <div class="header">📝 学术写作重构与反检测教练 🤖</div>
    <div id="chat-container">
        <div class="loader" id="loading">
            <div class="spinner"></div>
            <div>正在启动智能助手，请稍候...</div>
        </div>
    </div>

    <script>
        const SAT_TOKEN = 'sat_02gVccxXULXgsQ3OkYkrkp9s9n2UhsurDBsvtiTRWPcyW3BpNY4lFgdaVtr52slF';    // 替换成你的 SAT
        const BOT_ID = '7629241748220280842';     // 你的 Bot ID

        function getStudentId() {
            const key = 'coze_unique_student';
            let id = localStorage.getItem(key);
            if (!id) {
                id = 'student_' + Date.now() + '_' + Math.random().toString(36).substring(2, 12);
                localStorage.setItem(key, id);
            }
            return id;
        }

        function forceResizeContainer() {
            const container = document.getElementById('chat-container');
            if (container) {
                container.style.display = 'none';
                container.offsetHeight;
                container.style.display = '';
                setTimeout(() => window.dispatchEvent(new Event('resize')), 100);
            }
        }

        async function initChat() {
            const container = document.getElementById('chat-container');
            const loadingDiv = document.getElementById('loading');
            if (typeof CozeWebSDK === 'undefined') {
                if (loadingDiv) loadingDiv.innerHTML = '<div class="error-box">SDK 加载失败，请检查网络后刷新页面重试。</div>';
                return;
            }
            const studentId = getStudentId();
            if (loadingDiv) loadingDiv.remove();
            container.innerHTML = '';
            try {
                new CozeWebSDK.WebChatClient({
                    config: { bot_id: BOT_ID },
                    componentProps: { title: '学术写作教练' },
                    auth: {
                        type: 'token',
                        token: SAT_TOKEN,
                        onRefreshToken: async () => SAT_TOKEN,
                    },
                    userInfo: { id: studentId, nickname: '同学' },
                    layout: 'embed',      // 关键：嵌入模式，而不是右下角悬浮窗
                    container: container,
                });
                setTimeout(() => forceResizeContainer(), 500);
            } catch (err) {
                container.innerHTML = `<div class="error-box">启动失败：${err.message || '未知错误'}<br>请刷新页面或检查令牌权限</div>`;
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initChat);
        } else {
            initChat();
        }
    </script>
</body>
</html>
