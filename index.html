<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>学术写作重构与反检测教练</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        #chat-container {
            width: 100%;
            height: calc(100% - 60px);
        }
        .loading {
            text-align: center;
            margin-top: 50px;
            color: #555;
        }
    </style>
    <!-- 引入 Coze Chat SDK -->
    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
</head>
<body>
    <div class="header">📝 学术写作重构与反检测教练</div>
    <div id="chat-container">
        <div class="loading">正在初始化智能体，请稍候...</div>
    </div>

    <script>
        // ⭐️ 唯一需要替换的地方：填上你的 Cloudflare Worker 地址
        const WORKER_URL = 'https://coze-token-worker.ruoczhang.workers.dev';  // 👈 例如 https://coze-token-worker.你的子域.workers.dev

        async function initChat() {
            try {
                // 1. 向 Worker 请求专属 Access Token
                const response = await fetch(WORKER_URL);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                const accessToken = data.token;
                const sessionName = data.session_name;
                console.log('获取专属令牌成功，会话ID:', sessionName);

                // 2. 清空加载提示，准备渲染聊天界面
                const container = document.getElementById('chat-container');
                container.innerHTML = '';

                // 3. 使用 Access Token 初始化 Coze 聊天客户端
                new CozeWebSDK.WebChatClient({
                    config: {
                        bot_id: '7629241748220280842',   // 你的 Bot ID（不用改）
                    },
                    componentProps: {
                        title: '学术写作教练',
                    },
                    auth: {
                        type: 'token',
                        token: accessToken,
                        onRefreshToken: async () => accessToken,
                    },
                    container: container,
                });
            } catch (error) {
                console.error('初始化失败:', error);
                document.getElementById('chat-container').innerHTML = `<div class="loading" style="color:red;">加载失败，请刷新页面重试。<br>错误：${error.message}</div>`;
            }
        }

        initChat();
    </script>
</body>
</html>
